<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Playpen+Sans:wght@100..800&family=Rubik+Wet+Paint&family=Vast+Shadow&display=swap" rel="stylesheet">
<style>
  
    .container{
        display: flex;
        justify-content: center;
    }
    .todo::before{
        position: absolute;
        content: "";
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        z-index: -2;
        border-radius: 50px;
        opacity: 0.3;
     background-image: url("./todo.png");
      background-repeat: none;
      background-attachment: scroll;
      background-size:cover;
      
    }
    .todo{
        position: relative;
        z-index: 2;
       min-height: 800px;
       max-height:max-content;
       width: 800px;
       border: 2px solid black;
       border-radius: 50px;
      display: flex;
      justify-content:center;
    
    }
    .to{
        width: 600px;
    }
    h6{
        font-size: large;
        display: inline-block;
        margin-right: 65px;
    }
    .status{
        display: flex;
        justify-content: center;
    }
      h1,input,button,.status{
        margin-left: 50px;
    }
    .popup{
        position: absolute;
        height: 300px;
        width: 300px;
        border: 2px solid black;
        z-index: 10;
        background-color: cyan;
    }
</style>
</head>
<body>
<div class="container">
<div class="todo">
    <div class="to">
<h1 style="font-family: Vast Shadow;">My Todo List</h1>
<input type="text" name="" id="task" style="width: 300px; padding: 10px 20px;" placeholder="Enter Your tasks"><br><br>
<ol id="tasks" >
</ol>
<button  id="add" style="background-color: rgb(31, 240, 31); padding: 5px 10px; cursor: pointer; border: 2px solid rgb(31, 240, 31) ;">Add Task</button>
<button id="reset" style="background-color: red; padding: 5px 10px; cursor: pointer; border: 2px solid red; margin-left: 20px;" >Reset</button>
<br>
<br>
<div class="status">
<h6>Total Tasks: <span id="tot"></span></h6>
<h6>Completed tasks: <span id="com"></span></h6>
<h6>Tasks Yet to complete: <span id="yet"></span> </h6>
</div>

</div>
</div>
</div>
</body>
<script src="todo.js" defer></script>

</html>
